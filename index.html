<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #cfe8f7;
    --panel: rgba(255,255,255,.75);
    --panel-text: #2b3a4a;
    --btn-bg: rgba(255,255,255,.85);
    --btn-text: #2b3a4a;
    --shadow: rgba(30,60,90,.25);
  }
  body.dark {
    --bg: #0b1026;
    --panel: rgba(20,26,48,.8);
    --panel-text: #dbe4ff;
    --btn-bg: rgba(30,38,66,.9);
    --btn-text: #dbe4ff;
    --shadow: rgba(0,0,0,.6);
  }
  html, body {
    height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    transition: background .5s;
  }
  #wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 70px var(--shadow);
  }
  canvas { display: block; cursor: pointer; }
  #hud {
    position: absolute;
    top: 10px; right: 10px;
    display: flex; gap: 8px;
    z-index: 5;
  }
  .hud-btn {
    width: 42px; height: 42px;
    border: none; border-radius: 12px;
    background: var(--btn-bg);
    color: var(--btn-text);
    font-size: 19px; font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(6px);
    box-shadow: 0 3px 10px rgba(0,0,0,.18);
    transition: transform .12s, background .4s;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .hud-btn:hover { transform: scale(1.08); }
  .hud-btn:active { transform: scale(.94); }
  .hud-btn:focus-visible { outline: 3px solid #4fc3f7; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <button class="hud-btn" id="btnLang" title="Language / Ngôn ngữ">VI</button>
    <button class="hud-btn" id="btnTheme" title="Theme">🌙</button>
  </div>
</div>
<script>
(() => {
  'use strict';
  // ================= Cài đặt & i18n =================
  const I18N = {
    vi: {
      title: 'Flappy Bird',
      tap: 'Chạm / Click / Space để bay',
      best: 'Kỷ lục',
      result: 'KẾT QUẢ',
      score: 'Điểm',
      newBest: 'Kỷ lục mới!',
      retry: 'Chạm để chơi lại',
      gameOver: 'Game Over',
      medal: { gold: 'Vàng', silver: 'Bạc', bronze: 'Đồng' }
    },
    en: {
      title: 'Flappy Bird',
      tap: 'Tap / Click / Space to fly',
      best: 'Best',
      result: 'RESULT',
      score: 'Score',
      newBest: 'New best!',
      retry: 'Tap to play again',
      gameOver: 'Game Over',
      medal: { gold: 'Gold', silver: 'Silver', bronze: 'Bronze' }
    }
  };
  let lang = 'vi';
  let dark = false;
  const T = () => I18N[lang];

  // ================= Canvas (hỗ trợ màn hình retina) =================
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const W = 400, H = 600, GROUND_H = 76;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.scale(DPR, DPR);

  function fit() {
    const s = Math.min(innerWidth / W, innerHeight / H, 1.25);
    cv.style.width = (W * s) + 'px';
    cv.style.height = (H * s) + 'px';
  }
  addEventListener('resize', fit); fit();

  // ================= Trạng thái =================
  const STATE = { READY: 0, PLAY: 1, DYING: 2, DEAD: 3 };
  let state = STATE.READY;
  let score = 0, best = 0, isNewBest = false;
  let t = 0; // thời gian toàn cục (giây)
  let shake = 0, flash = 0, deadAt = 0;

  // ================= Chim =================
  const bird = {
    x: 105, y: H/2, r: 13.5,
    vy: 0, rot: 0, wing: 0,
    GRAVITY: 1500, FLAP: -430,
    reset() { this.y = H/2; this.vy = 0; this.rot = 0; },
    flap() {
      this.vy = this.FLAP;
      sfx('flap');
      spawnParticles(this.x - 12, this.y + 8, 4, dark ? '#8ab4ff' : '#ffffff', 60);
    },
    update(dt) {
      if (state === STATE.READY) {
        this.y = H/2 + Math.sin(t * 4) * 9;
        this.wing = Math.sin(t * 12);
        return;
      }
      this.vy += this.GRAVITY * dt;
      this.y += this.vy * dt;
      const target = Math.max(-0.45, Math.min(1.35, this.vy / 500));
      this.rot += (target - this.rot) * Math.min(1, dt * 14);
      this.wing = state === STATE.PLAY ? Math.sin(t * 26) : 0.9;
      if (this.y - this.r < 0) { this.y = this.r; this.vy = 40; }
      if (this.y + this.r > H - GROUND_H) {
        this.y = H - GROUND_H - this.r;
        if (state === STATE.PLAY) die();
        else if (state === STATE.DYING) { state = STATE.DEAD; deadAt = t; }
      }
    },
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      // bóng đổ nhẹ
      ctx.fillStyle = 'rgba(0,0,0,.12)';
      ctx.beginPath(); ctx.ellipse(1.5, 2.5, 16, 13, 0, 0, Math.PI*2); ctx.fill();
      // thân
      const body = ctx.createLinearGradient(0, -13, 0, 13);
      body.addColorStop(0, '#ffe066');
      body.addColorStop(1, '#f6b93b');
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.ellipse(0, 0, 16, 13, 0, 0, Math.PI*2); ctx.fill();
      // bụng
      ctx.fillStyle = '#fff6d5';
      ctx.beginPath(); ctx.ellipse(-2, 5.5, 9, 5.5, 0, 0, Math.PI*2); ctx.fill();
      // cánh
      ctx.save();
      ctx.translate(-5, 1);
      ctx.rotate(this.wing * 0.65);
      const wg = ctx.createLinearGradient(-8, 0, 8, 0);
      wg.addColorStop(0, '#e08e0b'); wg.addColorStop(1, '#f9a825');
      ctx.fillStyle = wg;
      ctx.beginPath(); ctx.ellipse(0, 3, 9.5, 6, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // mắt
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(7, -4.5, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1e2430';
      ctx.beginPath(); ctx.arc(8.6, -4.5, 2.4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(9.4, -5.4, 0.9, 0, Math.PI*2); ctx.fill();
      // mỏ
      ctx.fillStyle = '#ff7043';
      ctx.beginPath();
      ctx.moveTo(12, 0.5); ctx.lineTo(22, 3); ctx.lineTo(12, 6.5);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  };

  // ================= Ống =================
  const PIPE_W = 64, GAP = 148, SPEED = 155, SPACING = 205;
  let pipes = [];
  function spawnPipe() {
    const minTop = 60, maxTop = H - GROUND_H - GAP - 60;
    pipes.push({ x: W + 20, top: minTop + Math.random() * (maxTop - minTop), passed: false });
  }
  function updatePipes(dt) {
    if (state !== STATE.PLAY) return;
    if (!pipes.length || pipes[pipes.length-1].x < W - SPACING) spawnPipe();
    for (const p of pipes) {
      p.x -= SPEED * dt;
      if (!p.passed && p.x + PIPE_W < bird.x - bird.r) {
        p.passed = true; score++;
        sfx('score');
        spawnParticles(bird.x, bird.y, 8, '#ffd93d', 100);
      }
      if (bird.x + bird.r > p.x + 3 && bird.x - bird.r < p.x + PIPE_W - 3) {
        if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + GAP) die();
      }
    }
    if (pipes.length && pipes[0].x < -PIPE_W - 24) pipes.shift();
  }
  function drawPipes() {
    for (const p of pipes) {
      drawPipe(p.x, 0, p.top, true);
      drawPipe(p.x, p.top + GAP, H - GROUND_H - p.top - GAP, false);
    }
  }
  function drawPipe(x, y, h, flip) {
    const g = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
    if (dark) {
      g.addColorStop(0, '#2e7d5b'); g.addColorStop(0.3, '#48a97e'); g.addColorStop(1, '#1d5a3f');
    } else {
      g.addColorStop(0, '#57b657'); g.addColorStop(0.3, '#96dd8f'); g.addColorStop(1, '#3a8f3a');
    }
    ctx.fillStyle = g;
    ctx.fillRect(x, y, PIPE_W, h);
    const capH = 26, capY = flip ? y + h - capH : y;
    ctx.fillRect(x - 4, capY, PIPE_W + 8, capH);
    ctx.strokeStyle = dark ? 'rgba(0,0,0,.45)' : 'rgba(0,0,0,.22)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 4, capY, PIPE_W + 8, capH);
    // vệt sáng
    ctx.fillStyle = 'rgba(255,255,255,.18)';
    ctx.fillRect(x + 8, y, 7, h);
  }

  // ================= Nền (sáng / tối) =================
  const stars = Array.from({length: 60}, () => ({
    x: Math.random()*W, y: Math.random()*(H-GROUND_H-100), r: Math.random()*1.4+0.4, tw: Math.random()*6.28
  }));
  const clouds = Array.from({length: 5}, () => ({
    x: Math.random()*W, y: 40+Math.random()*180, s: 0.6+Math.random()*0.8, v: 12+Math.random()*16
  }));
  const hills = Array.from({length: 7}, (_, i) => ({
    x: i*80, w: 90+Math.random()*60, h: 40+Math.random()*55
  }));
  let hillX = 0, groundX = 0;

  function drawBackground(dt) {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    if (dark) {
      sky.addColorStop(0, '#0b1026'); sky.addColorStop(0.6, '#1a2547'); sky.addColorStop(1, '#2c3a63');
    } else {
      sky.addColorStop(0, '#5fb8f2'); sky.addColorStop(0.65, '#aadcf7'); sky.addColorStop(1, '#e3f4fd');
    }
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    if (dark) {
      // sao lấp lánh
      for (const s of stars) {
        const a = 0.4 + 0.6 * Math.abs(Math.sin(t * 1.5 + s.tw));
        ctx.fillStyle = `rgba(230,240,255,${a})`;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
      }
      // mặt trăng
      ctx.fillStyle = '#f5f3ce';
      ctx.beginPath(); ctx.arc(320, 90, 26, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a2547';
      ctx.beginPath(); ctx.arc(330, 82, 22, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(245,243,206,.15)';
      ctx.beginPath(); ctx.arc(320, 90, 40, 0, Math.PI*2); ctx.fill();
    } else {
      // mặt trời
      ctx.fillStyle = 'rgba(255,236,140,.5)';
      ctx.beginPath(); ctx.arc(325, 85, 42, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffe985';
      ctx.beginPath(); ctx.arc(325, 85, 27, 0, Math.PI*2); ctx.fill();
    }

    // mây
    const moving = state === STATE.PLAY || state === STATE.READY;
    ctx.fillStyle = dark ? 'rgba(90,110,160,.5)' : 'rgba(255,255,255,.9)';
    for (const c of clouds) {
      if (moving) { c.x -= c.v * dt; if (c.x < -90) { c.x = W + 90; c.y = 40 + Math.random()*180; } }
      ctx.beginPath();
      ctx.arc(c.x, c.y, 17*c.s, 0, Math.PI*2);
      ctx.arc(c.x + 19*c.s, c.y + 4*c.s, 13*c.s, 0, Math.PI*2);
      ctx.arc(c.x - 19*c.s, c.y + 5*c.s, 12*c.s, 0, Math.PI*2);
      ctx.fill();
    }

    // đồi xa (parallax chậm)
    if (moving) hillX = (hillX - SPEED * 0.22 * dt) % 80;
    ctx.fillStyle = dark ? '#141c38' : '#bfe3b4';
    for (let i = -1; i < 8; i++) {
      const hb = hills[(i + 8) % 7];
      const x = i*80 + hillX;
      ctx.beginPath();
      ctx.moveTo(x - hb.w/2, H - GROUND_H);
      ctx.quadraticCurveTo(x, H - GROUND_H - hb.h*2, x + hb.w/2, H - GROUND_H);
      ctx.fill();
    }
  }

  function drawGround(dt) {
    if (state === STATE.PLAY || state === STATE.READY) groundX = (groundX - SPEED * dt) % 24;
    ctx.fillStyle = dark ? '#3a3352' : '#e0d894';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = dark ? '#4a5d43' : '#8bc34a';
    ctx.fillRect(0, H - GROUND_H, W, 14);
    ctx.fillStyle = dark ? '#3e4f38' : '#7cb342';
    for (let x = groundX; x < W; x += 24) {
      ctx.beginPath();
      ctx.moveTo(x, H - GROUND_H + 14);
      ctx.lineTo(x + 12, H - GROUND_H);
      ctx.lineTo(x + 24, H - GROUND_H + 14);
      ctx.closePath(); ctx.fill();
    }
  }

  // ================= Hạt hiệu ứng =================
  let particles = [];
  function spawnParticles(x, y, n, color, speed) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = speed * (0.4 + Math.random()*0.8);
      particles.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, life: 0.5+Math.random()*0.3, age: 0, color, r: 1.5+Math.random()*2 });
    }
  }
  function updateParticles(dt) {
    for (const p of particles) {
      p.age += dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 300 * dt;
    }
    particles = particles.filter(p => p.age < p.life);
  }
  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = 1 - p.age / p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ================= Âm thanh =================
  let audioCtx = null;
  function sfx(type) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      if (type === 'flap') {
        o.type = 'square'; o.frequency.setValueAtTime(520, now);
        o.frequency.exponentialRampToValueAtTime(780, now + 0.07);
        g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
        o.start(now); o.stop(now + 0.09);
      } else if (type === 'score') {
        o.type = 'sine'; o.frequency.setValueAtTime(880, now);
        o.frequency.setValueAtTime(1174, now + 0.08);
        g.gain.setValueAtTime(0.07, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        o.start(now); o.stop(now + 0.18);
      } else if (type === 'hit') {
        o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now);
        o.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        g.gain.setValueAtTime(0.11, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
        o.start(now); o.stop(now + 0.32);
      }
    } catch (e) {}
  }

  // ================= UI =================
  function outlineText(txt, x, y, size, fill = '#fff', stroke = 'rgba(20,26,40,.85)') {
    ctx.font = `800 ${size}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.lineWidth = Math.max(3, size / 8);
    ctx.lineJoin = 'round';
    ctx.strokeStyle = stroke;
    ctx.strokeText(txt, x, y);
    ctx.fillStyle = fill;
    ctx.fillText(txt, x, y);
  }
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }
  function medalFor(s) {
    if (s >= 30) return { color: '#ffd54f', ring: '#c9a227', name: T().medal.gold };
    if (s >= 20) return { color: '#e0e0e0', ring: '#9e9e9e', name: T().medal.silver };
    if (s >= 10) return { color: '#d1935a', ring: '#8d5524', name: T().medal.bronze };
    return null;
  }
  function drawUI() {
    const L = T();
    if (state === STATE.PLAY) {
      outlineText(score, W/2, 84, 48);
    } else if (state === STATE.READY) {
      const bob = Math.sin(t * 3) * 4;
      outlineText(L.title, W/2, 165 + bob, 42, '#ffd93d');
      outlineText(L.tap, W/2, 355, 17);
      if (best > 0) outlineText(L.best + ': ' + best, W/2, 388, 15, '#fff3b0');
    } else if (state === STATE.DEAD || state === STATE.DYING) {
      if (state === STATE.DEAD) {
        ctx.fillStyle = 'rgba(0,0,0,.45)';
        ctx.fillRect(0, 0, W, H);
        outlineText(L.gameOver, W/2, 150, 38, '#ff7043');
        // bảng điểm
        const bw = 280, bh = 190, bx = (W-bw)/2, by = 185;
        const appear = Math.min(1, (t - deadAt) * 3);
        const oy = (1 - appear) * 30;
        ctx.globalAlpha = appear;
        ctx.fillStyle = dark ? '#1e2542' : '#fdf6e3';
        ctx.strokeStyle = dark ? '#4a5687' : '#c9b458';
        ctx.lineWidth = 4;
        roundRect(bx, by + oy, bw, bh, 16); ctx.fill(); ctx.stroke();
        ctx.textAlign = 'center';
        ctx.fillStyle = dark ? '#9fb0e8' : '#8a6d3b';
        ctx.font = '700 19px sans-serif';
        ctx.fillText(L.result, W/2, by + oy + 32);
        // huy chương
        const medal = medalFor(score);
        if (medal) {
          ctx.beginPath(); ctx.arc(bx + 56, by + oy + 92, 26, 0, Math.PI*2);
          ctx.fillStyle = medal.color; ctx.fill();
          ctx.lineWidth = 4; ctx.strokeStyle = medal.ring; ctx.stroke();
          ctx.fillStyle = medal.ring;
          ctx.font = '700 13px sans-serif';
          ctx.fillText(medal.name, bx + 56, by + oy + 134);
          ctx.font = '700 20px sans-serif';
          ctx.fillStyle = 'rgba(255,255,255,.85)';
          ctx.fillText('★', bx + 56, by + oy + 99);
        }
        const cx = medal ? bx + bw - 90 : W/2;
        ctx.fillStyle = dark ? '#9fb0e8' : '#8a6d3b';
        ctx.font = '600 14px sans-serif';
        ctx.fillText(L.score, cx, by + oy + 66);
        ctx.font = '800 34px sans-serif';
        ctx.fillStyle = '#ff8f3d';
        ctx.fillText(score, cx, by + oy + 100);
        ctx.font = '600 14px sans-serif';
        ctx.fillStyle = dark ? '#9fb0e8' : '#8a6d3b';
        ctx.fillText(L.best + ': ' + best, cx, by + oy + 126);
        if (isNewBest) {
          ctx.fillStyle = '#e65100';
          ctx.font = '700 13px sans-serif';
          ctx.fillText('🏆 ' + L.newBest, cx, by + oy + 146);
        }
        ctx.font = '600 15px sans-serif';
        ctx.fillStyle = dark ? '#dbe4ff' : '#6d5a2e';
        const blink = 0.55 + 0.45 * Math.sin(t * 5);
        ctx.globalAlpha = appear * blink;
        ctx.fillText(L.retry, W/2, by + oy + bh - 16);
        ctx.globalAlpha = 1;
      }
    }
    // hiệu ứng chớp trắng khi va chạm
    if (flash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flash})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // ================= Logic =================
  function die() {
    if (state !== STATE.PLAY) return;
    state = STATE.DYING;
    bird.vy = -220;
    shake = 0.35; flash = 0.7;
    isNewBest = score > best && score > 0;
    best = Math.max(best, score);
    sfx('hit');
    spawnParticles(bird.x, bird.y, 14, '#ff7043', 160);
  }
  function action() {
    if (state === STATE.READY) {
      state = STATE.PLAY;
      pipes = []; score = 0; isNewBest = false;
      bird.reset(); bird.flap();
    } else if (state === STATE.PLAY) {
      bird.flap();
    } else if (state === STATE.DEAD && t - deadAt > 0.5) {
      state = STATE.READY;
      bird.reset(); pipes = []; particles = [];
    }
  }
  cv.addEventListener('pointerdown', action);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); action(); }
  });

  // ================= Nút HUD =================
  const btnLang = document.getElementById('btnLang');
  const btnTheme = document.getElementById('btnTheme');
  btnLang.addEventListener('pointerdown', e => e.stopPropagation());
  btnTheme.addEventListener('pointerdown', e => e.stopPropagation());
  btnLang.addEventListener('click', () => {
    lang = lang === 'vi' ? 'en' : 'vi';
    btnLang.textContent = lang.toUpperCase();
    document.documentElement.lang = lang;
  });
  btnTheme.addEventListener('click', () => {
    dark = !dark;
    document.body.classList.toggle('dark', dark);
    btnTheme.textContent = dark ? '☀️' : '🌙';
  });

  // ================= Vòng lặp (delta-time, ổn định FPS) =================
  let last = performance.now();
  function loop(now) {
    let dt = Math.min((now - last) / 1000, 1/30);
    last = now;
    t += dt;
    if (flash > 0) flash = Math.max(0, flash - dt * 2.2);
    if (shake > 0) shake = Math.max(0, shake - dt);

    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random()-0.5) * shake * 22, (Math.random()-0.5) * shake * 22);
    }
    drawBackground(dt);
    updatePipes(dt);
    drawPipes();
    bird.update(dt);
    updateParticles(dt);
    drawGround(dt);
    drawParticles();
    bird.draw();
    ctx.restore();
    drawUI();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
